services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yieldmaxxing
      POSTGRES_PASSWORD: yieldmaxxing
      POSTGRES_DB: yieldmaxxing
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./go-api/db/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    networks:
      - yieldmaxxing
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yieldmaxxing"]
      interval: 5s
      timeout: 5s
      retries: 5

  go-api:
    build: ./go-api
    ports:
      - "9847:9847"
    environment:
      - DATABASE_URL=postgres://yieldmaxxing:yieldmaxxing@postgres:5432/yieldmaxxing?sslmode=disable
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL}
      - JWT_SECRET=${JWT_SECRET}
      - APP_URL=${APP_URL}
      - AGENT_SERVICE_URL=http://python-agents:8001
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:9847}
    depends_on:
      postgres:
        condition: service_healthy
      python-agents:
        condition: service_started
    networks:
      - yieldmaxxing

  python-agents:
    build: ./python-agents
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SH_CLIENT_ID=${SH_CLIENT_ID}
      - SH_CLIENT_SECRET=${SH_CLIENT_SECRET}
    networks:
      - yieldmaxxing

volumes:
  pgdata:

networks:
  yieldmaxxing:
    driver: bridge
