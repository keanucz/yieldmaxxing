name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/keanucz/yieldmaxxing-api
  AGENTS_IMAGE: ghcr.io/keanucz/yieldmaxxing-agents

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./go-api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-agents:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./python-agents
          push: true
          tags: |
            ${{ env.AGENTS_IMAGE }}:latest
            ${{ env.AGENTS_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-api, build-agents]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy frontend to VPS via kiwi
        run: |
          tar -czf /tmp/frontend-dist.tar.gz -C dist .
          scp -o StrictHostKeyChecking=no /tmp/frontend-dist.tar.gz root@100.85.82.61:/tmp/frontend-dist.tar.gz
          ssh -o StrictHostKeyChecking=no root@100.85.82.61 "scp /tmp/frontend-dist.tar.gz kiwirp:/tmp/frontend-dist.tar.gz && ssh kiwirp 'sudo rm -rf /opt/yieldmaxxing/dist && sudo mkdir -p /opt/yieldmaxxing/dist && sudo tar -xzf /tmp/frontend-dist.tar.gz -C /opt/yieldmaxxing/dist && rm /tmp/frontend-dist.tar.gz'"

      - name: Redeploy backend on kiwi
        run: |
          ssh -o StrictHostKeyChecking=no root@100.85.82.61 "cd /mnt/user/appdata/repos/yieldmaxxing && git pull origin master && docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d && chown -R 99:100 /mnt/user/appdata/repos/yieldmaxxing"
