name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/keanucz/yieldmaxxing-api
  AGENTS_IMAGE: ghcr.io/keanucz/yieldmaxxing-agents

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./go-api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-agents:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./python-agents
          push: true
          tags: |
            ${{ env.AGENTS_IMAGE }}:latest
            ${{ env.AGENTS_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Komodo (on Unraid) watches GHCR for new :latest tags and auto-deploys.
  # If you need manual redeploy, SSH to kiwi (100.85.82.61) via Tailscale:
  #   ssh root@100.85.82.61 "cd /mnt/user/appdata/repos/yieldmaxxing && docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d"
