services:
  api:
    image: ghcr.io/keanucz/yieldmaxxing-api:latest
    container_name: yieldmaxxing-api
    restart: unless-stopped
    ports:
      - "9847:9847"
    environment:
      - DATABASE_URL=postgres://yieldmaxxing:${POSTGRES_PASSWORD}@postgres:5432/yieldmaxxing
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URL=https://yieldmaxxing.keanuc.net/auth/callback
      - JWT_SECRET=${JWT_SECRET}
      - APP_URL=https://yieldmaxxing.keanuc.net
      - GIN_MODE=release
    depends_on:
      postgres:
        condition: service_healthy
      agents:
        condition: service_started
    networks:
      - yieldmaxxing

  agents:
    image: ghcr.io/keanucz/yieldmaxxing-agents:latest
    container_name: yieldmaxxing-agents
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SH_CLIENT_ID=${SH_CLIENT_ID}
      - SH_CLIENT_SECRET=${SH_CLIENT_SECRET}
    networks:
      - yieldmaxxing

  postgres:
    image: postgres:16-alpine
    container_name: yieldmaxxing-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=yieldmaxxing
      - POSTGRES_USER=yieldmaxxing
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yieldmaxxing -d yieldmaxxing"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yieldmaxxing

volumes:
  pgdata:

networks:
  yieldmaxxing:
    driver: bridge
